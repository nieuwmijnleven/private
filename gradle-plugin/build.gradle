/*
 * This file was generated by the Gradle 'init' task.
 *
 * This generated file contains a sample Gradle plugin project to get you started.
 * For more details on writing Custom Plugins, please refer to https://docs.gradle.org/8.12/userguide/custom_plugins.html in the Gradle documentation.
 */

import com.vanniktech.maven.publish.SonatypeHost

plugins {
    // Apply the Java Gradle plugin development plugin to add support for developing Gradle plugins
    id 'java-gradle-plugin'
    id 'signing'

    id "com.vanniktech.maven.publish" version "0.28.0"
    id "com.gradle.plugin-publish" version "2.0.0"
}

group = "io.github.nieuwmijnleven.jadex"
version = "0.628"

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {

    compileOnly project(":app")

    implementation gradleApi()

    implementation 'ch.qos.logback:logback-classic:1.5.32'
    //implementation 'org.projectlombok:lombok:1.18.42'

    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

gradlePlugin {

    website = 'https://github.com/nieuwmijnleven/JADEx'
    vcsUrl  = 'https://github.com/nieuwmijnleven/JADEx'

    // Define the plugin
    plugins {
        jadexPlugin {
            id = "io.github.nieuwmijnleven.jadex"
            implementationClass = "jadex.gradle.JadexPlugin"

            displayName = 'JADEx Gradle Plugin'
            description = 'Java Advanced Development Extension'
            tags = ['java', 'jadex']
        }
    }
}

tasks.named('jar', Jar) {

    from project(":app").sourceSets.main.output

    from project(":app").configurations.runtimeClasspath.collect {
        it.isDirectory() ? it : zipTree(it)
    }

    from sourceSets.main.resources

    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

mavenPublishing {
    publishToMavenCentral(SonatypeHost.CENTRAL_PORTAL)
    signAllPublications()

    coordinates("io.github.nieuwmijnleven.jadex", "jadex-gradle-plugin", "0.628")

    pom {
        name = 'JADEx Gradle Plugin'
        description = 'JADEx Gradle plugin'
        url = 'https://github.com/nieuwmijnleven/JADEx'

        licenses {
            license {
                name = 'GPL v2 only + Commercial'
                url = 'https://github.com/nieuwmijnleven/JADEx/blob/master/LICENSE'
            }
        }
        developers {
            developer {
                id = 'nieuwmijnleven'
                name = 'Cheol Jeon'
                email = 'nieuwmijnleven@outlook.com'
            }
        }
        scm {
            connection = 'scm:git:git://github.com/nieuwmijnleven/JADEx.git'
            url = 'https://github.com/nieuwmijnleven/JADEx'
        }
    }
}

gradle.taskGraph.whenReady { taskGraph ->
    if (taskGraph.hasTask(":gradle-plugin:build")
            || taskGraph.hasTask(":gradle-plugin:publishToMavenLocal")
            || taskGraph.hasTask(":gradle-plugin:publishAndReleaseToMavenCentral")
            || taskGraph.hasTask(":gradle-plugin:publishPlugins")) {

        project(":app").tasks.named("generateGrammarSource").configure {
            enabled = false
        }
        project(":app").tasks.named("generateTestGrammarSource").configure {
            enabled = false
        }

        project(":intellij-plugin").tasks.named("generateGrammarSource").configure {
            enabled = false
        }
        project(":intellij-plugin").tasks.named("generateTestGrammarSource").configure {
            enabled = false
        }
    }
}

